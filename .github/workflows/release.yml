name: Build & Release

# 触发条件：推送 v* 标签（如 v1.0.0）或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # 创建 GitHub Release 需要写权限

# ─────────────────────────────────────────────
# 所需 GitHub Secrets（在仓库 Settings → Secrets → Actions 中配置）
#
# macOS 签名（可选，无证书时跳过签名/公证，仍可打包但他人安装会有警告）：
#   APPLE_CERT_P12_BASE64  - Developer ID Application 证书 .p12 转 base64
#                            生成方式：base64 -i cert.p12 | pbcopy
#   APPLE_CERT_PASSWORD    - P12 文件的密码
#   APPLE_ID               - 用于公证的 Apple ID（邮箱）
#   APPLE_APP_PASSWORD     - App 专用密码（appleid.apple.com 生成）
#   APPLE_TEAM_ID          - 10 位 Team ID（如 ABC1234567）
#
# Windows 签名（可选）：
#   WIN_CERT_P12_BASE64    - Windows 代码签名证书 .p12 转 base64
#   WIN_CERT_PASSWORD      - P12 密码
# ─────────────────────────────────────────────

jobs:
  # ───────────────────────────── macOS arm64（Apple Silicon / M 芯片）
  build-mac-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14          # GitHub 提供的 Apple Silicon 原生 runner
    env:
      PYTHON_VERSION: '3.11'
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }} (arm64 native)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python backend (arm64)
        run: pnpm run build:python

      - name: Import macOS signing certificate
        # 有证书时才执行；若 Secret 未配置则跳过签名（仍可打包）
        if: ${{ env.APPLE_CERT_P12_BASE64 != '' }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build-${{ github.run_id }}.keychain
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-keychain-settings -t 7200 -u "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          rm -f /tmp/cert.p12

      - name: Build Electron app (arm64, signed + notarized)
        env:
          # 签名：electron-builder 自动从 keychain 中查找 Developer ID Application 证书
          CSC_NAME: ${{ secrets.APPLE_CERT_P12_BASE64 != '' && 'Developer ID Application' || '' }}
          # 公证：需要 APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD（electron-builder v25 命名）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          NOTARIZE_ARG=""
          if [ -n "$APPLE_TEAM_ID" ]; then
            NOTARIZE_ARG="--config.mac.notarize.teamId=$APPLE_TEAM_ID"
          fi
          node scripts/sync-icons.mjs
          node scripts/check-python-dist.mjs
          pnpm exec vite build --config vite.electron.config.ts
          pnpm exec electron-builder --mac --arm64 $NOTARIZE_ARG

      - name: Upload arm64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: release/*.dmg
          if-no-files-found: error

  # ───────────────────────────── macOS x64（Intel 芯片）
  build-mac-x64:
    name: macOS x64 (Intel)
    runs-on: macos-13          # Intel runner（macos-latest 已切换到 arm64，用 macos-13 获取 Intel）
    env:
      PYTHON_VERSION: '3.11'
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }} (x64 native)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python backend (x64)
        run: pnpm run build:python

      - name: Import macOS signing certificate
        if: ${{ env.APPLE_CERT_P12_BASE64 != '' }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build-${{ github.run_id }}.keychain
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-keychain-settings -t 7200 -u "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          rm -f /tmp/cert.p12

      - name: Build Electron app (x64, signed + notarized)
        env:
          CSC_NAME: ${{ secrets.APPLE_CERT_P12_BASE64 != '' && 'Developer ID Application' || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          NOTARIZE_ARG=""
          if [ -n "$APPLE_TEAM_ID" ]; then
            NOTARIZE_ARG="--config.mac.notarize.teamId=$APPLE_TEAM_ID"
          fi
          node scripts/sync-icons.mjs
          node scripts/check-python-dist.mjs
          pnpm exec vite build --config vite.electron.config.ts
          pnpm exec electron-builder --mac --x64 $NOTARIZE_ARG

      - name: Upload x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: release/*.dmg
          if-no-files-found: error

  # ───────────────────────────── Windows x64
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    env:
      PYTHON_VERSION: '3.11'
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python backend (Windows x64)
        run: pnpm run build:python

      - name: Build Electron app (Windows, optionally signed)
        env:
          # Windows 签名可选：设置 CSC_LINK + CSC_KEY_PASSWORD 后 electron-builder 自动签名
          CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          node scripts/sync-icons.mjs
          node scripts/check-python-dist.mjs
          pnpm exec vite build --config vite.electron.config.ts
          pnpm exec electron-builder --win --x64

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            release/*.exe
          if-no-files-found: error

  # ───────────────────────────── 汇总 Release
  release:
    name: Create GitHub Release
    needs: [build-mac-arm64, build-mac-x64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true          # 先创建草稿，人工检查后发布
          generate_release_notes: true
          files: |
            artifacts/mac-arm64/*.dmg
            artifacts/mac-x64/*.dmg
            artifacts/windows-x64/*.exe
